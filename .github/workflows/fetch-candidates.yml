name: Weekly Fetch Candidates

on:
  schedule:
    # Maandag 06:00 Europe/Amsterdam. UTC = 04:00 (zomer) of 05:00 (winter).
    # Twee triggers zodat we het hele jaar rond 06:00 lokaal raken; de skip-
    # check voorkomt dubbele fetches.
    - cron: '0 4 * * 1'
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-candidates
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Skip if candidates for this week already exist
        id: check
        run: |
          WEEK_FILE="pending/$(date -u +%G-W%V).json"
          if [ -f "$WEEK_FILE" ]; then
            echo "Pending voor deze week bestaat al: $WEEK_FILE"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch candidates
        if: steps.check.outputs.skip != 'true'
        run: |
          cd src
          python fetch_candidates.py

      - name: Commit and push pending
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "huisartsendigest-bot"
          git config user.email "actions@github.com"
          git add pending/
          if ! git diff --staged --quiet; then
            git commit -m "Pending candidates week $(date -u +%G-W%V)"
            git push
          else
            echo "Geen nieuwe pending file om te committen."
          fi
