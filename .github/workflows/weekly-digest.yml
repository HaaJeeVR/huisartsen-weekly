name: Weekly Huisartsen Digest

on:
  schedule:
    # Maandag 07:00 Europe/Amsterdam. UTC = 05:00 (zomer) of 06:00 (winter).
    # GitHub Actions cron is UTC. Twee triggers zodat we het hele jaar 07:00 lokaal raken,
    # met dedup-bescherming: de script weigert te draaien als er deze week al een digest is.
    - cron: '0 5 * * 1'
    - cron: '0 6 * * 1'
  workflow_dispatch:        # handmatige trigger voor tests

permissions:
  contents: write           # nodig om de digest terug te committen

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Skip if digest for this week already exists
        id: check
        run: |
          WEEK_FILE="docs/digests/$(date -u +%G-W%V).html"
          if [ -f "$WEEK_FILE" ]; then
            echo "Digest voor deze week bestaat al: $WEEK_FILE"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python main.py

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "huisartsendigest-bot"
          git config user.email "actions@github.com"
          git add docs/
          if ! git diff --staged --quiet; then
            git commit -m "Digest week $(date -u +%G-W%V)"
            git push
          else
            echo "Geen wijzigingen om te committen."
          fi
